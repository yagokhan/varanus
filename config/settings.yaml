# varanus/config/settings.yaml — Runtime configuration (v5.0)
# Secrets (VARANUS_BOT_TOKEN, VARANUS_CHAT_ID) are loaded from .env — NOT committed.

# ── Data ────────────────────────────────────────────────────────────────────────
data:
  cache_dir:   "/home/yagokhan/chameleon/claude_code_project/data/cache"
  timeframe_4h: "4h"
  timeframe_1d: "1d"
  min_candles:  500   # Skip asset if fewer bars available

# ── Optimization ────────────────────────────────────────────────────────────────
optimization:
  n_trials:         300
  n_jobs:           1             # Serial to avoid data-race with Optuna SQLite
  study_name:       "varanus_v5_pf_net"
  db_path:          "config/optuna_v5.db"
  params_out:       "config/best_params_v5.json"
  sampler:          "TPESampler"
  pruner:           "HyperbandPruner"

# ── Walk-Forward Validation ──────────────────────────────────────────────────────
walk_forward:
  n_folds:          8
  train_ratio:      0.40
  val_ratio:        0.30
  test_ratio:       0.30
  gap_candles:      24            # 4-day embargo between splits
  consistency_req:  0.75          # 6/8 folds must PASS acceptance gate

# ── Backtest ─────────────────────────────────────────────────────────────────────
backtest:
  initial_capital:            5000.0
  maker_fee:                  0.0002
  taker_fee:                  0.0005
  slippage_pct:               0.0008
  max_concurrent_positions:   4
  max_portfolio_leverage:     3.5
  corr_block_threshold:       0.75
  corr_lookback_days:         20
  power_setup_size_scalar:    1.25
  high_vol_size_scalar:       0.75

# ── Risk ─────────────────────────────────────────────────────────────────────────
risk:
  portfolio_stop_pct:         0.15    # -15% from peak → halt
  daily_loss_limit_pct:       0.05    # -5% in 24h → halt
  power_setup_max_concurrent: 2       # Max simultaneous 5x PS positions

# ── Results ───────────────────────────────────────────────────────────────────────
output:
  results_dir:  "results/"
  plots_dir:    "plots/"
  trade_log:    "results/step5_trades_v5.csv"
  wfv_report:   "results/step6_wfv_v5.xlsx"
  equity_plot:  "plots/equity_curve_v5.png"

# ── Alerts ─────────────────────────────────────────────────────────────────────
alerts:
  dry_run:      true    # Set to false for live Telegram delivery
  # Credentials loaded from .env:
  #   VARANUS_BOT_TOKEN
  #   VARANUS_CHAT_ID
